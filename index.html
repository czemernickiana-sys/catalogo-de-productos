<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANITA STORE - Catálogo Spa de Uñas</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body { background: #fff1f2; min-height: 100vh; display: flex; }
      .sidebar { width: 260px; background: white; border-right: 2px solid #fbcfe8; padding: 25px 15px; transition: margin-left 0.3s ease; box-shadow: 2px 0 8px rgba(236, 72, 153, 0.1); position: sticky; top: 0; height: 100vh; overflow-y: auto; }
      .sidebar.cerrado { margin-left: -260px; }
      .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
      .sidebar h2 { color: #db2777; font-size: 22px; font-weight: bold; }
      .btn-toggle { background: #ec4899; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; line-height: 1; }
      .btn-toggle:hover { background: #db2777; }
      .btn-toggle-flotante { position: fixed; top: 20px; left: 20px; background: #ec4899; color: white; border: none; padding: 12px 16px; border-radius: 8px; cursor: pointer; font-size: 20px; font-weight: bold; z-index: 999; box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: none; }
      .btn-toggle-flotante.visible { display: block; }
      .btn-filtro { width: 100%; background: #fce7f3; color: #831843; border: 2px solid #f9a8d4; padding: 12px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: all 0.2s; margin-bottom: 10px; text-align: left; }
      .btn-filtro:hover { background: #f9a8d4; color: white; transform: translateX(4px); }
      .btn-filtro.activo { background: #ec4899; color: white; border-color: #ec4899; }
      .main { flex: 1; padding: 25px; overflow-x: hidden; }
      .header { margin-bottom: 25px; }
        h1 { color: #db2777; text-align: center; font-size: 42px; margin-bottom: 8px; font-weight: bold; }
      .subtitulo { text-align: center; color: #831843; font-size: 16px; margin-bottom: 20px; }
      .contador { text-align: center; color: #831843; font-size: 14px; margin-bottom: 20px; background: white; padding: 10px; border-radius: 8px; border: 1px solid #fbcfe8; }
      .cargando { text-align: center; color: #db2777; font-size: 18px; padding: 40px; }
      .galeria { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
      .card-foto { background: white; border-radius: 12px; padding: 12px; box-shadow: 0 2px 8px rgba(236, 72, 153, 0.15); border: 1px solid #fbcfe8; transition: transform 0.2s; position: relative; }
      .card-foto:hover { transform: translateY(-4px); box-shadow: 0 4px 12px rgba(236, 72, 153, 0.25); }
      .img-container { width: 100%; height: 300px; border-radius: 8px; overflow: hidden; background: #fce7f3; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; position: relative; cursor: pointer; }
      .img-container img { width: 100%; height: 100%; object-fit: cover; }
      .img-placeholder { font-size: 60px; color: #f9a8d4; }
      .info-foto { padding: 0 4px; }
      .nombre-foto { font-weight: bold; color: #831843; font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .categoria-foto { font-size: 11px; color: #be185d; background: #fdf2f8; display: inline-block; padding: 3px 8px; border-radius: 4px; margin-bottom: 6px; }
      .descripcion-foto { font-size: 12px; color: #831843; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
      .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
      .lightbox.activo { display: flex; }
      .lightbox-contenido { position: relative; max-width: 90%; max-height: 90%; display: flex; flex-direction: column; align-items: center; }
      .lightbox-img { max-width: 100%; max-height: 70vh; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
      .lightbox-info { background: white; padding: 20px 25px; border-radius: 8px; margin-top: 15px; text-align: left; max-width: 600px; width: 100%; }
      .lightbox-info h3 { color: #db2777; font-size: 20px; margin-bottom: 5px; }
      .lightbox-cat { color: #be185d; font-size: 13px; background: #fdf2f8; display: inline-block; padding: 3px 8px; border-radius: 4px; margin-bottom: 12px; }
      .lightbox-desc { color: #831843; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
      .lightbox-cerrar { position: absolute; top: 20px; right: 30px; background: #ef4444; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 24px; font-weight: bold; line-height: 1; }
      .lightbox-cerrar:hover { background: #dc2626; }
      .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(236, 72, 153, 0.8); color: white; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 28px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
      .lightbox-nav:hover { background: #ec4899; }
      .lightbox-prev { left: 30px; }
      .lightbox-next { right: 30px; }
    </style>
</head>
<body>
    <div class="sidebar cerrado" id="sidebar">
        <div class="sidebar-header">
            <h2>Categorías</h2>
            <button class="btn-toggle" onclick="toggleSidebar()">✕</button>
        </div>
        <button class="btn-filtro activo" onclick="filtrarCategoria('todas')">📁 Todas</button>
        <button class="btn-filtro" onclick="filtrarCategoria('herramientas')">🔧 Herramientas</button>
        <button class="btn-filtro" onclick="filtrarCategoria('pinceles')">🖌️ Pinceles</button>
        <button class="btn-filtro" onclick="filtrarCategoria('maquinas')">⚙️ Máquinas de Pulir</button>
        <button class="btn-filtro" onclick="filtrarCategoria('lamparas')">💡 Lámparas</button>
        <button class="btn-filtro" onclick="filtrarCategoria('accesorios')">✨ Accesorios</button>
    </div>
    <button class="btn-toggle-flotante visible" id="btn-flotante" onclick="toggleSidebar()">☰</button>
    <div class="main">
        <div class="header">
            <h1>ANITA STORE</h1>
            <p class="subtitulo">Catálogo Spa de Uñas - Herramientas & Accesorios</p>
        </div>
        <div class="contador" id="contador">Cargando productos...</div>
        <div class="cargando" id="cargando">⏳ Cargando catálogo...</div>
        <div class="galeria" id="galeria"></div>
    </div>
    <div class="lightbox" id="lightbox" onclick="cerrarLightbox(event)">
        <button class="lightbox-cerrar" onclick="cerrarLightbox()">✕</button>
        <button class="lightbox-nav lightbox-prev" onclick="fotoAnterior(event)">‹</button>
        <div class="lightbox-contenido" onclick="event.stopPropagation()">
            <img class="lightbox-img" id="lightbox-img" src="" alt="">
            <div class="lightbox-info">
                <h3 id="lightbox-nombre"></h3>
                <span class="lightbox-cat" id="lightbox-categoria"></span>
                <p class="lightbox-desc" id="lightbox-descripcion"></p>
            </div>
        </div>
        <button class="lightbox-nav lightbox-next" onclick="fotoSiguiente(event)">›</button>
    </div>
    <script>
        let productos = [];
        let categoriaActual = 'todas';
        let indiceLightbox = 0;
        let productosFiltrados = [];
        window.onload = async function() {
            try {
                const response = await fetch('./productos.json');
                productos = await response.json();
                document.getElementById('cargando').style.display = 'none';
                renderizarGaleria();
            } catch (error) {
                document.getElementById('cargando').innerHTML = '❌ Error: No encuentro productos.json. Crealo en el repo.';
            }
        };
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const btnFlotante = document.getElementById('btn-flotante');
            sidebar.classList.toggle('cerrado');
            btnFlotante.classList.toggle('visible');
        }
        function filtrarCategoria(cat) {
            categoriaActual = cat;
            document.querySelectorAll('.btn-filtro').forEach(btn => btn.classList.remove('activo'));
            event.target.classList.add('activo');
            renderizarGaleria();
        }
        function renderizarGaleria() {
            const galeria = document.getElementById('galeria');
            galeria.innerHTML = '';
            productosFiltrados = categoriaActual === 'todas'? productos : productos.filter(p => p.categoria === categoriaActual);
            document.getElementById('contador').textContent = `Mostrando ${productosFiltrados.length} producto${productosFiltrados.length!== 1? 's' : ''}`;
            productosFiltrados.forEach((producto, index) => {
                const card = document.createElement('div');
                card.className = 'card-foto';
                card.innerHTML = `
                    <div class="img-container" onclick="abrirLightbox(${index})">
                        <img src="${producto.url}" alt="${producto.nombre}" referrerpolicy="no-referrer" onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'>📷</div>'">
                    </div>
                    <div class="info-foto">
                        <div class="nombre-foto" title="${producto.nombre}">${producto.nombre}</div>
                        <span class="categoria-foto">${producto.categoria}</span>
                        <p class="descripcion-foto">${producto.descripcion || ''}</p>
                    </div>
                `;
                galeria.appendChild(card);
            });
        }
        function abrirLightbox(index) {
            indiceLightbox = index;
            mostrarFotoLightbox();
            document.getElementById('lightbox').classList.add('activo');
            document.body.style.overflow = 'hidden';
        }
        function cerrarLightbox(e) {
            if (!e || e.target.id === 'lightbox') {
                document.getElementById('lightbox').classList.remove('activo');
                document.body.style.overflow = 'auto';
            }
        }
        function mostrarFotoLightbox() {
            const producto = productosFiltrados[indiceLightbox];
            document.getElementById('lightbox-img').src = producto.url;
            document.getElementById('lightbox-nombre').textContent = producto.nombre;
            document.getElementById('lightbox-categoria').textContent = producto.categoria;
            document.getElementById('lightbox-descripcion').textContent = producto.descripcion || 'Sin descripción';
        }
        function fotoAnterior(e) {
            e.stopPropagation();
            indiceLightbox = (indiceLightbox - 1 + productosFiltrados.length) % productosFiltrados.length;
            mostrarFotoLightbox();
        }
        function fotoSiguiente(e) {
            e.stopPropagation();
            indiceLightbox = (indiceLightbox + 1) % productosFiltrados.length;
            mostrarFotoLightbox();
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') cerrarLightbox();
            if (document.getElementById('lightbox').classList.contains('activo')) {
                if (e.key === 'ArrowLeft') fotoAnterior(e);
                if (e.key === 'ArrowRight') fotoSiguiente(e);
            }
        });
    </script>
</body>
</html>
